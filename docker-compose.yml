version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowcare
      POSTGRES_USER: flowcare
      POSTGRES_PASSWORD: flowcare123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: flowcare
      DB_USER: flowcare
      DB_PASSWORD: flowcare123
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
